name: Court Hearing Monitor

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python monitor.py
      - name: Save state and ICS feed
        run: |
          git config user.name "Court Monitor Bot"
          git config user.email "bot@local"
          git add state.json debug_headers.json docs/hearings.ics 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update state and calendar [skip ci]"
          git pull --rebase || true
          git push
