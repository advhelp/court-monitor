name: Register Clients

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run registration
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CASES_DB_ID: ${{ secrets.NOTION_CASES_DB_ID }}
          NOTION_CLIENTS_DB_ID: ${{ secrets.NOTION_CLIENTS_DB_ID }}
        run: python register_client.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add register_state.json
          git diff --staged --quiet || git commit -m "Update register state"
          git push
